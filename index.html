<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hary300 TodoList</title>
    <link rel="stylesheet" href="./src/output.css" />
    <script src="./script.js" defer></script>
  </head>
  <body
    class="bg-[#d6dceb] dark:bg-[#0F1116] flex flex-col items-center px-3 justify-center min-h-screen"
  >
    <div
      class="rounded-lg w-full max-w-120 bg-white dark:bg-[#202630] text-gray-700 dark:text-gray-400 shadow-[0_0_5px_rgba(0,0,0,0.1)] overflow-hidden"
    >
      <div id="container" class="flex flex-col p-4 gap-2">
        <!-- === 1. HEADER === -->
        <header class="flex flex-col justify-between">
          <div class="flex justify-between">
            <h1 class="text-2xl font-semibold mb-3 md:mb-5 md:text-3xl">
              Hary300 Todo List
            </h1>
            <button
              id="dark-mode-button"
              class="size-7 border rounded-lg cursor-pointer flex justify-center items-center p-0.5 bg-[#202630] dark:bg-white"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="white"
                class="size-6"
              >
                <path
                  fill-rule="evenodd"
                  d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>

          <div class="flex justify-between items-end gap-10">
            <div
              class="p-2 md:p-3 text-white bg-[#3F9CA1] shadow-[0_0_2px_#3F9CA1] rounded-lg flex flex-col md:gap-1"
            >
              <p id="clock" class="text-2xl md:text-3xl"></p>
              <p id="date" class="text-sm md:text-base">
                Tuesday, 26 October 2023
              </p>
            </div>
            <p
              class="flex justify-center items-center text-xs md:text-sm rounded-full gap-1"
            >
              <span
                id="task-number"
                class="flex justify-center items-center rounded-full bg-[#3F9CA1] size-7 text-white"
                >5</span
              >
              <span class="py-1.5">Task Left</span>
            </p>
          </div>
        </header>

        <!-- === 2. MAIN === -->
        <main class="flex flex-col gap-6">
          <!-- 2.1 Form -->
          <div class="flex flex-col gap-1">
            <p id="error-text" class="ml-2 text-red-500 invisible">
              Todo cannot be empty
            </p>
            <div class="flex justify-between gap-2">
              <input
                id="input-todo"
                type="text"
                placeholder="Add new task..."
                class="w-full rounded-2xl border-2 border-[#3F9CA1] pl-3 md:py-2.5 md:rounded-3xl focus:outline-none focus:shadow-[0_0_5px_#3F9CA1]"
              />
              <button
                id="todo-add-button"
                class="flex min-w-25 text-sm items-center justify-center gap-1 p-2 rounded-lg bg-[#3F9CA1] text-white cursor-pointer"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 4.5v15m7.5-7.5h-15"
                  />
                </svg>
                Add Task
              </button>
            </div>
          </div>

          <!-- 2.2 Todo List -->
          <section id="todo-list">
            <ul
              id="todo-container"
              class="flex flex-col divide-y divide-gray-400"
            >
              <!--  -->
            </ul>
          </section>
        </main>
      </div>
      <footer class="text-center p-2 bg-[#EEF2F4] dark:bg-[#1c2127]">
        &copy 2026 Created by
        <a href="https://github.com/Hary300" target="_blank"> Hary300</a>
      </footer>
    </div>
  </body>
</html>
